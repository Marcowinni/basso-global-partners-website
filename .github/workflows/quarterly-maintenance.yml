name: Quarterly Maintenance

# Runs 1st day of Jan/Apr/Jul/Oct at 03:00 UTC — audits deps + checks for broken links.
on:
  schedule:
    - cron: '0 3 1 1,4,7,10 *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  maintenance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Audit dependencies (nodemailer, @vercel/blob)
        id: audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Check for broken links (site HTML)
        id: links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --exclude-mail "*.html"
        continue-on-error: true

      - name: Open issue if problems found
        if: steps.audit.outcome == 'failure' || steps.links.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Quarterly maintenance findings — ${today}`,
              body: [
                '## Automated quarterly check',
                '',
                `- npm audit: ${'${{ steps.audit.outcome }}' === 'failure' ? '⚠️ vulnerabilities found' : '✅ clean'}`,
                `- link check: ${'${{ steps.links.outcome }}' === 'failure' ? '⚠️ broken links found' : '✅ clean'}`,
                '',
                `See full run for details: ${runUrl}`,
              ].join('\n'),
            });
